[discovery]
process_names = ["landscape-webserver"]
cmdline_keywords = ["landscape-webserver"]
# Optional: only match tasks in these cgroup path fragments.
# cgroup_prefixes = ["/system.slice/landscape-webserver.service"]
# Optional: after process/cmdline match, only keep threads with these name prefixes.
# If empty, all threads in matched processes are considered.
# thread_include_prefixes = ["tokio-runtime-w", "sqlx-sqlite-wor", "r2d2-worker-"]
# Optional: exclude matched threads by name prefix after include filtering.
# thread_exclude_prefixes = ["tokio-runtime-worker-blocking"]

[policy]
# Reserve forwarding cores for network-heavy threads.
forwarding_cpus = [0, 1]
# Reserve control-plane cores for management/UI/API work.
control_cpus = [2, 3]
manage_ksoftirqd = true
# Optional explicit ksoftirqd CPU allowlist. If empty, forwarding_cpus is used.
# Only matching ksoftirqd/N threads are managed.
# ksoftirqd_cpus = [0, 1]
apply_sched_ext = true
# Optional per-thread-name policy classes (prefix match, first match wins).
# cpus = [] means "inherit the default CPU set for this thread kind".
# apply_sched_ext / apply_affinity override the default action for that class only.
thread_cpu_classes = [
  { thread_name_prefix = "tokio-runtime-w", cpus = [2, 3], apply_sched_ext = true, apply_affinity = true },
  { thread_name_prefix = "sqlx-sqlite-wor", cpus = [4], apply_sched_ext = false, apply_affinity = true },
  { thread_name_prefix = "r2d2-worker-", cpus = [5], apply_sched_ext = false, apply_affinity = true },
]

[network]
# Optional NIC locality management for forwarding interfaces.
# Managed interfaces must exist under /sys/class/net.
# String form uses policy.forwarding_cpus for all interfaces:
# interfaces = ["ens27f0", "ens16f1np1"]
# Table form allows per-interface CPU islands / queue counts / XPS mode / ethtool policy:
# interfaces = [
#   { name = "ens27f0", forwarding_cpus = [0, 1, 2, 3], active_queue_count = 4, apply_rss_equal = true, apply_combined_channels = true, clear_inactive_xps = true, xps_mode = "cpus" },
#   { name = "ens16f1np1", forwarding_cpus = [4, 5, 6, 7], active_queue_count = 4, xps_mode = "rxqs" },
# ]
# Apply IRQ affinity using policy.forwarding_cpus and queue_mapping_mode.
apply_irq_affinity = false
# Apply tx-*/xps_cpus or tx-*/xps_rxqs depending on xps_mode.
apply_xps = false
# Optionally collapse RSS indirection to the first active_queue_count queues via `ethtool -X equal N`.
apply_rss_equal = false
# Optionally reduce NIC combined channels to active_queue_count via `ethtool -L combined N`.
apply_combined_channels = false
# Optionally zero inactive tx-*/xps_cpus and tx-*/xps_rxqs above active_queue_count.
clear_inactive_xps = false
# round_robin => queue N maps to forwarding_cpus[N % len]
# full_mask   => every queue gets the full forwarding CPU mask
queue_mapping_mode = "round_robin"
# cpus => manage xps_cpus, rxqs => manage xps_rxqs
xps_mode = "cpus"
# 0 means "all usable queues"; otherwise only the first N queue IRQs / TX queues are managed.
active_queue_count = 0

[scheduler]
mode = "external_command"
# Default scheduler command.
start_command = ["scx_cosmos"]
# Optional explicit stop command. If empty, agent uses pid_file + SIGTERM.
stop_command = []
pid_file = "/run/landscape-scx/scheduler.pid"
ready_timeout_ms = 3000
fallback_on_error = true

[scheduler.custom_bpf]
# Experimental built-in queue-island scheduler.
# `run` renders the current intent to an auto-generated header, compiles
# bpf/landscape_scx.bpf.c, and registers it through bpftool struct_ops.
# Keep using mode = "external_command" for the stable path.
switch_mode = "partial"
# If empty, policy.control_cpus is used.
housekeeping_cpus = []
# Optional explicitly tagged forwarding workers that should be mapped to qids.
forwarding_thread_prefixes = []
source_file = "./bpf/landscape_scx.bpf.c"
build_dir = "/run/landscape-scx/custom-bpf"
link_dir = "/run/landscape-scx/custom-bpf/links"

[agent]
apply_interval_secs = 10
