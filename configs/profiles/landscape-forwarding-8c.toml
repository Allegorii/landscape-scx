[discovery]
process_names = ["landscape-webserver"]
cmdline_keywords = ["landscape-webserver"]
thread_include_prefixes = [
  "ksoftirqd/",
  "tokio-runtime-w",
  "sqlx-sqlite-wor",
  "r2d2-worker-",
  "landscape_pppoe",
  "landscape-webs",
]

[policy]
# 8-core Landscape profile:
# - reserve 0-3 for forwarding / softirq-heavy work
# - keep Tokio / DB / unnamed helper threads on 4-7
# - only opt specific classes into SCHED_EXT
forwarding_cpus = [0, 1, 2, 3]
control_cpus = [4, 5, 6, 7]
manage_ksoftirqd = true
ksoftirqd_cpus = [0, 1, 2, 3]
apply_sched_ext = false
thread_cpu_classes = [
  { thread_name_prefix = "ksoftirqd/", cpus = [], apply_sched_ext = true, apply_affinity = false },
  { thread_name_prefix = "landscape_pppoe", cpus = [0, 1], apply_sched_ext = true, apply_affinity = true },
  { thread_name_prefix = "tokio-runtime-w", cpus = [4, 5], apply_sched_ext = false, apply_affinity = true },
  { thread_name_prefix = "sqlx-sqlite-wor", cpus = [6], apply_sched_ext = false, apply_affinity = true },
  { thread_name_prefix = "r2d2-worker-", cpus = [7], apply_sched_ext = false, apply_affinity = true },
  { thread_name_prefix = "landscape-webs", cpus = [6, 7], apply_sched_ext = false, apply_affinity = true },
]

[scheduler]
mode = "external_command"
start_command = ["scx_cosmos"]
stop_command = []
pid_file = "/run/landscape-scx/scheduler.pid"
ready_timeout_ms = 3000
fallback_on_error = true

[agent]
apply_interval_secs = 5
